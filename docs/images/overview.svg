<svg viewBox="0 0 900 220" xmlns="http://www.w3.org/2000/svg" font-family="sans-serif">
  <defs>
    <marker id="arrow" markerWidth="10" markerHeight="10" refX="8" refY="3" orient="auto" markerUnits="strokeWidth">
      <path d="M0,0 L8,3 L0,6 Z" fill="#5b6b7c"/>
    </marker>
  </defs>
  <style>
    .box { fill:#eef4fb; stroke:#3b6ea5; stroke-width:2; rx:10; }
    .label { font-size:15px; fill:#1f2d3d; font-weight:bold; }
    .sub { font-size:11px; fill:#52606d; }
    .arrow { stroke:#5b6b7c; stroke-width:2; fill:none; marker-end:url(#arrow); }
  </style>

  <rect class="box" x="20" y="60" width="160" height="90"/>
  <text class="label" x="100" y="100" text-anchor="middle">ローカルPC</text>
  <text class="sub" x="100" y="120" text-anchor="middle">docs/*.md</text>
  <text class="sub" x="100" y="135" text-anchor="middle">mkdocs.yml</text>

  <line class="arrow" x1="185" y1="105" x2="245" y2="105"/>
  <text class="sub" x="215" y="95" text-anchor="middle">git push</text>

  <rect class="box" x="250" y="60" width="160" height="90"/>
  <text class="label" x="330" y="100" text-anchor="middle">GitHub</text>
  <text class="sub" x="330" y="120" text-anchor="middle">main ブランチ</text>
  <text class="sub" x="330" y="135" text-anchor="middle">(リポジトリ)</text>

  <line class="arrow" x1="415" y1="105" x2="475" y2="105"/>
  <text class="sub" x="445" y="95" text-anchor="middle">トリガー</text>

  <rect class="box" x="480" y="60" width="180" height="90"/>
  <text class="label" x="570" y="95" text-anchor="middle">GitHub Actions</text>
  <text class="sub" x="570" y="115" text-anchor="middle">mkdocs gh-deploy</text>
  <text class="sub" x="570" y="130" text-anchor="middle">(.github/workflows/deploy.yml)</text>

  <line class="arrow" x1="665" y1="105" x2="715" y2="105"/>
  <text class="sub" x="690" y="95" text-anchor="middle">push</text>

  <rect class="box" x="720" y="60" width="160" height="90"/>
  <text class="label" x="800" y="95" text-anchor="middle">gh-pages</text>
  <text class="sub" x="800" y="115" text-anchor="middle">ブランチ</text>
  <text class="sub" x="800" y="130" text-anchor="middle">(公開用ビルド結果)</text>

  <line class="arrow" x1="800" y1="150" x2="800" y2="190"/>
  <text class="label" x="800" y="205" text-anchor="middle" font-size="13">GitHub Pages で公開</text>
</svg>
