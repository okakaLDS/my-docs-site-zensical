<svg viewBox="0 0 700 260" xmlns="http://www.w3.org/2000/svg" font-family="sans-serif">
  <rect x="0" y="0" width="700" height="260" fill="#ffffff" stroke="#d0d7de" stroke-width="2" rx="6"/>
  <rect x="0" y="0" width="700" height="40" fill="#f6f8fa" stroke="#d0d7de"/>
  <text x="16" y="26" font-size="15" fill="#24292f" font-weight="bold">Settings &gt; Pages （イメージ図）</text>

  <text x="20" y="70" font-size="13" fill="#57606a">Build and deployment</text>

  <text x="20" y="100" font-size="13" fill="#24292f">Source</text>
  <rect x="100" y="85" width="220" height="28" rx="4" fill="#f6f8fa" stroke="#d0d7de"/>
  <text x="115" y="103" font-size="12" fill="#24292f">Deploy from a branch ▾</text>

  <text x="20" y="150" font-size="13" fill="#24292f">Branch</text>
  <rect x="100" y="135" width="160" height="28" rx="4" fill="#ddf4ff" stroke="#54aeff" stroke-width="2"/>
  <text x="115" y="153" font-size="12" fill="#0969da" font-weight="bold">gh-pages ▾</text>
  <rect x="270" y="135" width="90" height="28" rx="4" fill="#f6f8fa" stroke="#d0d7de"/>
  <text x="285" y="153" font-size="12" fill="#24292f">/ (root) ▾</text>

  <rect x="20" y="195" width="80" height="30" rx="6" fill="#2da44e"/>
  <text x="60" y="215" font-size="13" fill="#fff" text-anchor="middle">Save</text>

  <text x="380" y="100" font-size="12" fill="#57606a">↑ ここで gh-pages ブランチを</text>
  <text x="380" y="118" font-size="12" fill="#57606a">　公開元として選択する</text>

  <text x="20" y="248" font-size="11" fill="#888">※ 今回はAPI(gh api repos/.../pages)で同じ設定を行いました</text>
</svg>
